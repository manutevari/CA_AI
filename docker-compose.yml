services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taxpilot
      POSTGRES_PASSWORD: taxpilot
      POSTGRES_DB: taxpilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxpilot -d taxpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://taxpilot:taxpilot@postgres:5432/taxpilot
      REDIS_URL: redis://redis:6379/0
      STORAGE_LOCAL_PATH: /data/uploads
      SECRET_KEY: docker-dev-secret-change-me
      JWT_SECRET: docker-dev-jwt-change-me
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+psycopg://taxpilot:taxpilot@postgres:5432/taxpilot
      REDIS_URL: redis://redis:6379/0
      STORAGE_LOCAL_PATH: /data/uploads
      SECRET_KEY: docker-dev-secret-change-me
      JWT_SECRET: docker-dev-jwt-change-me
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
